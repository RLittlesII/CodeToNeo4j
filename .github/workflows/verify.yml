name: Build, Test, and Cover

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          clean: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Build TS Analyzer
        working-directory: tools/ts-analyzer
        run: npm ci && npm run build

      - name: Test TS Analyzer
        working-directory: tools/ts-analyzer
        run: npm test

      - name: Dart Test
        working-directory: tools/dart-analyzer
        run: ${{ github.workspace }}/.github/scripts/verify_dart-test.sh

      - name: .NET Restore
        run: ./.github/scripts/verify_dotnet-restore.sh

      - name: .NET Build
        run: ./.github/scripts/verify_dotnet-build.sh

      - name: .NET Test
        run: ./.github/scripts/verify_dotnet-test.sh

      - name: Upload Dart Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tools/dart-analyzer/coverage/lcov.info
          flags: dart
          fail_ci_if_error: false
          skip_validation: true

      - name: Upload .NET Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./TestResults
          flags: dotnet
          fail_ci_if_error: false
          skip_validation: true

      - name: Collect Test Results
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const script = require('./.github/scripts/collect-test-results.js')
            await script()

      - name: Upload Test Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: test-summary
          path: test-summary.json
          retention-days: 1
